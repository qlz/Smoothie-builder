<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Smoothie Builder</title>
  <style>
    :root {
      --bg: #fffdf9;
      --surface: #ffffff;
      --surface-2: #faf6ef;
      --text: #22231f;
      --muted: #74746c;
      --line: #e9e2d8;
      --accent: #ff5f73;
      --accent-soft: #fff0f2;
      --sage: #757d5a;
      --shadow: 0 1px 2px rgba(36, 31, 24, .05);
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --space: 8px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    button { font: inherit; color: inherit; cursor: pointer; }

    .page {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .topbar {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .leaf {
      width: 13px;
      height: 18px;
      border-radius: 100% 0 100% 0;
      background: var(--sage);
      transform: rotate(34deg);
      margin-top: -18px;
      margin-left: -5px;
    }

    .icon-row { display: flex; align-items: center; gap: 16px; color: var(--muted); }
    .icon-button { width: 40px; height: 40px; display: grid; place-items: center; background: transparent; border: 0; padding: 0; }

    .hero { position: relative; height: 438px; margin-bottom: 2px; }
    .orbit { position: absolute; left: 40px; right: 40px; top: 36px; height: 296px; border-radius: 50%; border: 1px dashed rgba(255, 95, 115, .22); border-bottom-color: transparent; }
    .blender { position: absolute; left: 50%; top: 124px; transform: translateX(-50%); width: 132px; height: 198px; z-index: 3; }
    #bubbleLayer { position: absolute; inset: 0; z-index: 4; }

    .bubble {
      position: absolute;
      z-index: 4;
      width: 78px;
      height: 78px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      transition: transform .16s ease, border-color .16s ease, opacity .16s ease;
    }

    .bubble:active { transform: scale(.98); }
    .bubble.is-selected { border-color: var(--accent); background: var(--accent-soft); }
    .bubble .asset { width: 48px; height: 48px; }

    .bubble .add {
      position: absolute;
      right: -4px;
      bottom: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--surface);
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 500;
      line-height: 1;
    }

    .bubble.is-selected .add { background: var(--sage); font-size: 15px; font-weight: 800; }
    .bubble.is-empty { border-style: dashed; background: rgba(255,255,255,.74); }
    .bubble[data-slot="0"] { left: 58px; top: 4px; }
    .bubble[data-slot="1"] { right: 58px; top: 4px; }
    .bubble[data-slot="2"] { left: 8px; top: 148px; }
    .bubble[data-slot="3"] { right: 8px; top: 148px; }
    .bubble[data-slot="4"] { left: 58px; top: 292px; }
    .bubble[data-slot="5"] { right: 58px; top: 292px; }

    .bubble-name {
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      max-width: 92px;
      color: var(--text);
      font-size: 11px;
      line-height: 1.1;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bubble-remove {
      position: absolute;
      left: -5px;
      top: 8px;
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      z-index: 6;
    }

    .picker-popover {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 2px;
      z-index: 8;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 16px 40px rgba(36, 31, 24, .12);
      padding: 12px;
    }

    .picker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .picker-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-height: 148px;
      overflow: auto;
    }

    .picker-item {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      font-size: 11px;
      line-height: 1.1;
      text-align: center;
    }

    .picker-item .asset { width: 30px; height: 30px; }
    .picker-item:disabled { opacity: .38; background: var(--surface-2); }

    .select-panel {
      position: relative;
      z-index: 5;
      margin-top: -24px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .empty-state {
      grid-column: 1 / -1;
      min-height: 88px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: var(--surface-2);
      color: var(--muted);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
      font-size: 14px;
      line-height: 1.35;
    }

    .chip-card {
      min-height: 88px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      position: relative;
      font-size: 13px;
      line-height: 1.1;
      text-align: center;
      color: var(--text);
    }

    .chip-card svg { width: 38px; height: 38px; }
    .chip-card .x { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border: 0; border-radius: 50%; background: var(--surface-2); color: var(--muted); display: grid; place-items: center; font-size: 16px; line-height: 1; }
    .ingredient-select { width: calc(100% - 12px); border: 0; border-radius: 999px; background: var(--surface-2); color: var(--text); padding: 7px 8px; font-size: 11px; font-weight: 700; text-align: center; }

    .helper-row { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin: 12px 0 0; color: var(--muted); font-size: 14px; line-height: 1.35; }
    .mini-button { border: 0; background: transparent; color: var(--accent); font-weight: 700; padding: 0; }

    .primary {
      width: 100%;
      height: 48px;
      border-radius: 999px;
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 8px 0 10px;
    }

    .feedback { border: 1px solid var(--line); border-radius: 20px; background: var(--surface); padding: 10px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .feedback-header { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 9px; margin-bottom: 8px; }
    .mascot { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-soft); border: 1px solid #ffd9df; display: grid; place-items: center; flex: 0 0 auto; }
    .mascot svg { width: 22px; height: 22px; }

    .feedback h2, .section-title { margin: 0; font-size: 18px; line-height: 1.15; letter-spacing: -0.03em; font-weight: 850; }
    .feedback p, .section-link, .muted { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.25; font-weight: 400; }

    .compact-score { display: none; min-width: 70px; padding: 6px 8px; border-radius: 16px; border: 1px solid #ffd9df; background: var(--accent-soft); text-align: center; }
    .compact-score.is-visible { display: block; }
    .compact-score span { display: block; color: var(--muted); font-size: 9px; line-height: 1; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .compact-score strong { display: block; margin-top: 2px; color: var(--text); font-size: 28px; line-height: .9; font-weight: 950; letter-spacing: -0.06em; }
    .compact-score::after { content: 'Updated'; display: block; max-height: 0; opacity: 0; overflow: hidden; color: var(--sage); font-size: 9px; line-height: 1; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; transition: opacity .18s ease, max-height .18s ease, margin-top .18s ease; }
    .compact-score.is-updated { animation: scorePulse .7s ease-out; }
    .compact-score.is-updated::after { max-height: 12px; opacity: 1; margin-top: 4px; }

    @keyframes scorePulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,95,115,.25); }
      45% { transform: scale(1.04); box-shadow: 0 0 0 7px rgba(255,95,115,.08); }
      100% { transform: scale(1); box-shadow: none; }
    }

    .score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 7px; }
    .score-card { position: relative; min-height: 52px; border: 1px solid var(--line); border-radius: 15px; padding: 7px 7px 7px 10px; background: linear-gradient(90deg, rgba(255,95,115,.08), rgba(255,255,255,.98)); overflow: hidden; }
    .score-card::before { content: ''; position: absolute; left: 0; top: 9px; bottom: 9px; width: 4px; border-radius: 999px; background: var(--accent); opacity: .72; }
    .score-label { display: flex; align-items: center; gap: 4px; color: var(--muted); font-size: 10px; line-height: 1; margin-bottom: 5px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .score-label::before { content: ''; width: 14px; height: 14px; border-radius: 50%; background: #dff5e6; box-shadow: inset 0 0 0 4px #61d87a; opacity: .9; }
    .score-value { display: block; color: var(--text); font-size: 20px; line-height: .95; font-weight: 950; letter-spacing: -0.04em; text-align: right; }

    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
    .tag { min-height: 22px; padding: 3px 7px; border: 1px solid var(--line); border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text); background: var(--surface); }
    .recommendation { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-top: 7px; border-top: 1px solid var(--line); }
    .ghost { min-height: 34px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 14px; font-weight: 700; white-space: nowrap; }

    .section { margin-bottom: 24px; }
    .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .section-link { color: var(--muted); text-decoration: none; }
    .rail { display: grid; grid-auto-flow: column; grid-auto-columns: 92px; gap: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .rail::-webkit-scrollbar { display: none; }

    .tile {
      height: 100px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      position: relative;
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .tile svg { width: 40px; height: 40px; }
    .status { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; line-height: 1; background: var(--sage); color: #fff; }
    .tile:not(.is-selected) .status { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .tile.is-selected { background: var(--accent-soft); border-color: #ffd9df; }

    .bottom-safe { height: 16px; width: 120px; border-radius: 999px; background: #d7d1ca; margin: 8px auto 0; }
    svg { display: block; }
    .line-icon { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .motion-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: rgba(255, 95, 115, .32); }
    .d1 { left: 108px; top: 116px; } .d2 { right: 116px; top: 84px; } .d3 { right: 92px; top: 270px; }


    .save-button { min-height: 34px; padding: 0 12px; border-radius: 999px; border: 0; background: var(--sage); color: #fff; font-size: 14px; font-weight: 800; white-space: nowrap; }
    .category-group { margin-bottom: 18px; }
    .category-title { margin: 0 0 8px; color: var(--muted); font-size: 13px; line-height: 1.2; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
    .category-group .rail { margin-bottom: 2px; }
    .history-list { display: grid; gap: 10px; }
    .history-card { border: 1px solid var(--line); border-radius: 18px; background: var(--surface); padding: 12px; box-shadow: var(--shadow); }
    .history-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .history-title { margin: 0; font-size: 15px; line-height: 1.2; font-weight: 800; }
    .history-date { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .history-ingredients { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .history-empty { border: 1px dashed var(--line); border-radius: 18px; background: var(--surface-2); color: var(--muted); padding: 16px; font-size: 14px; text-align: center; }


    .blender.is-blending {
      animation: blenderShake .08s linear infinite;
      transform-origin: 50% 58%;
    }

    .blender.is-blending #smoothieFill,
    .blender.is-blending #smoothieFoam,
    .blender.is-blending #smoothieBits,
    .blender.is-blending #smoothieFace {
      animation: smoothiePulse .22s ease-in-out infinite alternate;
      transform-origin: 50% 48%;
    }

    @keyframes blenderShake {
      0% { transform: translateX(-50%) rotate(-1.3deg) translateY(0); }
      50% { transform: translateX(-50%) rotate(1.3deg) translateY(-1px); }
      100% { transform: translateX(-50%) rotate(-1.3deg) translateY(0); }
    }

    @keyframes smoothiePulse {
      from { transform: scaleX(.97) translateY(1px); opacity: .86; }
      to { transform: scaleX(1.04) translateY(-1px); opacity: 1; }
    }

    .size-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 10px;
      margin: 0 0 8px;
      box-shadow: var(--shadow);
    }

    .size-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .size-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .recipe-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
    }

    .size-tabs {
      display: inline-grid;
      grid-template-columns: repeat(3, auto);
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(250,246,239,.76);
      flex: 0 0 auto;
    }

    .header-size-tabs { align-self: center; }

    .size-tab {
      min-height: 24px;
      min-width: 34px;
      padding: 0 7px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .size-tab.is-active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .amount-list {
      display: grid;
      gap: 3px;
    }

    .amount-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 5px 7px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.15;
    }

    .amount-row:last-child { border-bottom: 0; }
    .amount-name { font-weight: 850; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .amount-control { display: inline-flex; align-items: center; gap: 4px; color: var(--muted); text-align: right; }
    .amount-stepper { width: 23px; height: 23px; border-radius: 50%; border: 1px solid var(--line); background: var(--surface-2); color: var(--muted); display: grid; place-items: center; font-weight: 900; line-height: 1; }
    .amount-stepper:disabled { opacity: .35; }
    .amount-value { min-width: 72px; color: var(--text); font-weight: 800; text-align: center; }
    .amount-note { display: block; color: var(--muted); font-size: 10px; font-weight: 600; margin-top: 1px; }
    .amount-empty { color: var(--muted); font-size: 12px; line-height: 1.3; padding: 2px 4px 4px; }

    .overall-score-card { display: none !important; }

    .history-actions { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    .load-button { min-height: 34px; padding: 0 12px; border-radius: 999px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 13px; font-weight: 800; }



    .bubble-amount-chip {
      position: absolute;
      z-index: 6;
      width: 112px;
      min-height: 24px;
      padding: 2px 4px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 3px;
      backdrop-filter: blur(8px);
    }

    .bubble-amount-chip[data-slot="0"] { left: 97px; top: 103px; transform: translateX(-50%); }
    .bubble-amount-chip[data-slot="1"] { left: calc(100% - 97px); top: 103px; transform: translateX(-50%); }
    .bubble-amount-chip[data-slot="2"] { left: 47px; top: 247px; transform: translateX(-50%); }
    .bubble-amount-chip[data-slot="3"] { left: calc(100% - 47px); top: 247px; transform: translateX(-50%); }
    .bubble-amount-chip[data-slot="4"] { left: 97px; top: 391px; transform: translateX(-50%); }
    .bubble-amount-chip[data-slot="5"] { left: calc(100% - 97px); top: 391px; transform: translateX(-50%); }

    .bubble-amount-button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
      padding: 0;
      flex: 0 0 auto;
    }

    .bubble-amount-button:disabled { opacity: .32; }
    .bubble-amount-value {
      width: 62px;
      color: var(--text);
      font-size: 10px;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .size-panel.is-compact-size-only {
      padding: 8px 10px;
      margin: -2px 0 8px;
    }

    .size-panel.is-compact-size-only .size-top { margin-bottom: 0; }
    .size-panel.is-compact-size-only #amountSuggestions { display: none; }

    .recipe-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      padding: 14px;
      box-shadow: 0 10px 28px rgba(36, 31, 24, .06);
    }

    .recipe-card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
    }

    .recipe-card-title {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .recipe-title-input {
      width: 100%;
      margin: 0 0 4px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 900;
      outline: none;
    }

    .recipe-title-input:focus {
      box-shadow: 0 2px 0 var(--accent);
    }

    .recipe-card-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
    }

    .recipe-score {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      border: 1px solid #ffd9df;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .recipe-lines {
      display: grid;
      gap: 6px;
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
    }

    .recipe-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.2;
    }

    function amountKey(id) {
      return `${state.smoothieSize}:${id}`;
    }

    function amountConfig(id) {
      return amountDefaults[id] || { unit: 'custom', bySize: { 12: 1, 16: 1, 32: 1 }, min: 0, max: 10 };
    }

    function defaultAmount(id) {
      const config = amountConfig(id);
      return config.bySize[state.smoothieSize] ?? config.bySize[16] ?? 1;
    }

    function amountValue(id) {
      const key = amountKey(id);
      return state.amounts[key] ?? defaultAmount(id);
    }

    function amountStep(id) {
      const config = amountConfig(id);
      if (config.step) return config.step;
      if (config.unit === 'cup' || config.unit === 'tsp') return 0.25;
      if (config.unit === 'item' || config.unit === 'scoop') return 0.25;
      return 1;
    }

    function formatFraction(value) {
      const rounded = Math.round(value * 16) / 16;
      const whole = Math.floor(rounded);
      const frac = Math.round((rounded - whole) * 16);
      const fractions = { 0: '', 1: '1⁄16', 2: '⅛', 3: '3⁄16', 4: '¼', 5: '5⁄16', 6: '⅜', 7: '7⁄16', 8: '½', 9: '9⁄16', 10: '⅝', 11: '11⁄16', 12: '¾', 13: '13⁄16', 14: '⅞', 15: '15⁄16' };
      if (!whole && !frac) return '0';
      if (!whole) return fractions[frac];
      return frac ? `${whole} ${fractions[frac]}` : String(whole);
    }

    function formatAmount(id) {
      const config = amountConfig(id);
      const value = amountValue(id);
      if (config.unit === 'cup') return `${formatFraction(value)} cup${value === 1 ? '' : 's'}`;
      if (config.unit === 'tsp') return `${formatFraction(value)} tsp`;
      if (config.unit === 'g') return `${value} g`;
      if (config.unit === 'scoop') return `${formatFraction(value)} ${config.label || 'scoop'}${value === 1 ? '' : 's'}`;
      if (config.unit === 'item') return `${formatFraction(value)} ${config.label || 'item'}`;
      return `${value}`;
    }

    function adjustAmount(id, direction) {
      const config = amountConfig(id);
      const step = amountStep(id);
      const next = Math.max(config.min ?? 0, Math.min(config.max ?? 99, amountValue(id) + direction * step));
      state.amounts[amountKey(id)] = Math.round(next * 10000) / 10000;
      renderBubbles();
      renderAmountSuggestions();
    }

    function setSmoothieSize(size) {

    function renderAmountSuggestions() {
      const list = document.getElementById('amountSuggestions');

        list.innerHTML = '<p class="amount-empty">Add ingredients to see a recipe-style amount list.</p>';

      list.innerHTML = state.selected.map(id => {
        const config = amountConfig(id);
        const value = amountValue(id);
        const atMin = value <= (config.min ?? 0);
        const atMax = value >= (config.max ?? 99);
        return `<div class="amount-row">
          <span class="amount-name">${byId[id]?.name || id}${config.note ? `<span class="amount-note">${config.note}</span>` : ''}</span>
          <span class="amount-control">
            <button class="amount-stepper" type="button" data-amount-id="${id}" data-delta="-1" ${atMin ? 'disabled' : ''} aria-label="Decrease ${byId[id]?.name || id}">−</button>
            <span class="amount-value">${formatAmount(id)}</span>
            <button class="amount-stepper" type="button" data-amount-id="${id}" data-delta="1" ${atMax ? 'disabled' : ''} aria-label="Increase ${byId[id]?.name || id}">+</button>
          </span>
        </div>`;
      }).join('');
      list.querySelectorAll('[data-amount-id]').forEach(button => {

    function setSmoothieFace(score) {

      } else {
        mouth.setAttribute('d', 'M73 149c4-8 25-8 30 0');
      }
    }

    function averageScore(result) {
      return Math.round((result.texture + result.satiety + result.flavor) / 3);

    function renderBubbles() {
      const layer = document.getElementById('bubbleLayer');
      const bubbleMarkup = state.slots.map((id, index) => {

        return `<div class="bubble-amount-chip" data-slot="${index}" aria-label="Amount for ${byId[id]?.name || id}">
          <button class="bubble-amount-button" type="button" data-bubble-amount-id="${id}" data-delta="-1" ${atMin ? 'disabled' : ''} aria-label="Decrease ${byId[id]?.name || id}">−</button>
          <span class="bubble-amount-value">${formatAmount(id)}</span>
          <button class="bubble-amount-button" type="button" data-bubble-amount-id="${id}" data-delta="1" ${atMax ? 'disabled' : ''} aria-label="Increase ${byId[id]?.name || id}">+</button>

      layer.innerHTML = bubbleMarkup + amountMarkup;
      layer.querySelectorAll('.bubble').forEach(button => {

    function openPicker(slotIndex) {
      state.activeSlot = slotIndex;
      const picker = document.getElementById('ingredientPicker');
      const currentId = state.slots[slotIndex];

      picker.innerHTML = `<div class="picker-head"><span>${currentId ? `Change ${byId[currentId].name}` : 'Choose an ingredient'} — already-used items are disabled</span><button class="picker-close" type="button" aria-label="Close picker">×</button></div><div class="picker-grid">${allPickerIds.map(id => {

    function clampScore(value) { return Math.max(0, Math.min(100, value)); }
    function scoreLabel(score) {
      if (score >= 82) return 'Great';
      if (score >= 62) return 'Good';
      if (score >= 40) return 'Needs help';
      return 'Missing';
    }

    function evaluateSmoothie() {
      const items = state.selected.map(id => byId[id]);
      const has = role => items.some(item => item.roles.includes(role));
      const count = role => items.filter(item => item.roles.includes(role)).length;
      const total = key => items.reduce((sum, item) => sum + item[key], 0);
      const liquid = has('liquid');
      const bulk = count('bulk');
      const protein = total('protein');
      const fat = total('fat');
      const fiber = total('fiber');
      const emulsifier = total('emulsifier');
      const sweetness = total('sweetness');
      const tart = items.filter(item => item.flavor === 'tart').length;
      const green = items.filter(item => item.flavor === 'green').length;
      const tannic = items.filter(item => item.flavor === 'tannic').length;

      if (!items.length) {
        return {
          title: 'Add ingredients first',
          summary: 'A smoothie needs at least a liquid base and one bulk ingredient before it can blend well.',
          texture: 0,
          satiety: 0,
          flavor: 0,
          tags: ['Needs liquid', 'Needs fruit or greens', 'Add protein or fat'],
          recommendation: 'Add oat milk, coconut water, or tea to start the vortex near the blade.',
          suggestion: 'milk'
        };
      }

      let texture = 20;
      if (liquid) texture += 28;
      if (bulk >= 1) texture += 18;
      if (emulsifier >= 1) texture += 24;
      if (total('texture') >= 5) texture += 10;
      if (!liquid && items.length > 1) texture -= 20;
      if (bulk >= 4 && !emulsifier) texture -= 12;
      texture = clampScore(texture);

      let satiety = 15;
      if (protein >= 1) satiety += 28;
      if (fat >= 1) satiety += 22;
      if (fiber >= 2) satiety += 22;
      if (sweetness >= 6 && protein === 0) satiety -= 18;
      if (sweetness >= 7 && fat === 0) satiety -= 12;
      if (liquid) satiety += 8;
      satiety = clampScore(satiety);

      let flavor = 35;
      if (sweetness >= 2) flavor += 18;
      if (tart >= 1) flavor += 12;
      if (items.some(item => item.flavor === 'sweet') && tart >= 1) flavor += 14;
      if (green && sweetness < 2) flavor -= 15;
      if (tannic && sweetness < 2) flavor -= 10;
      if (items.length === 1 && liquid) flavor -= 15;
      if (items.length >= 3) flavor += 8;
      flavor = clampScore(flavor);

      const overall = Math.round((texture + satiety + flavor) / 3);
      const tags = [];
      if (liquid) tags.push('Liquid base'); else tags.push('Needs liquid');
      if (emulsifier) tags.push('Creamy emulsion'); else tags.push('Needs banana/yogurt');
      if (protein) tags.push('Protein'); else tags.push('Low protein');
      if (fat || fiber >= 2) tags.push('Steady energy'); else tags.push('Add fat/fiber');
      if (sweetness >= 6 && protein + fat < 2) tags.push('Sugar-heavy');
      if (tart >= 2 && !items.some(item => item.flavor === 'sweet')) tags.push('Very tart');
      if (state.selected.includes('matcha') && !state.selected.includes('milk') && !state.selected.includes('soy')) tags.push('Matcha likes milk');

      let recommendation = 'This is balanced: liquids first, blend only until smooth, and drink right away.';
      let suggestion = null;
      if (!liquid) { recommendation = 'Add a liquid base so the blades can pull everything into a vortex.'; suggestion = 'milk'; }
      else if (!bulk) { recommendation = 'Add fruit for bulk and fiber. Frozen fruit will chill the smoothie without watering it down.'; suggestion = 'blueberry'; }
      else if (!emulsifier) { recommendation = 'Add Greek yogurt, banana, avocado, or peanut butter to make the texture more stable and velvety.'; suggestion = state.selected.includes('yogurt') ? 'banana' : 'yogurt'; }
      else if (!protein) { recommendation = 'Add Greek yogurt, soy milk, peanut butter, or protein powder to make it more filling and blood-sugar friendly.'; suggestion = state.selected.includes('soy') ? 'yogurt' : 'soy'; }
      else if (!fat && fiber < 2) { recommendation = 'Add chia, flax, avocado, or peanut butter for healthy fat and fiber so the smoothie keeps you full longer.'; suggestion = state.selected.includes('chia') ? 'flax' : 'chia'; }
      else if (sweetness >= 7) { recommendation = 'This may be fruit-heavy. Add yogurt, soy milk, chia, or flax to slow the sugar hit.'; suggestion = state.selected.includes('chia') ? 'yogurt' : 'chia'; }
      else if (state.selected.includes('honey') && sweetness >= 5) { recommendation = 'Honey is tasty, but this is already sweet. Use just a small drizzle or balance it with yogurt/chia.'; suggestion = state.selected.includes('yogurt') ? 'chia' : 'yogurt'; }

      state.lastSuggestion = suggestion;
      return {
        title: overall >= 82 ? 'Balanced smoothie' : overall >= 62 ? 'Pretty balanced' : 'Needs a tweak',
        summary: overall >= 82 ? 'Texture, satiety, and flavor are all working together.' : overall >= 62 ? 'A strong base, but one pillar could be improved.' : 'One or more smoothie science pillars are missing.',
        texture,
        satiety,
        flavor,
        tags,
        recommendation,
        suggestion
      };
    }

    function shortRecommendation(text) {
      if (/liquid base/i.test(text)) return 'Add liquid.';
      if (/Add fruit/i.test(text)) return 'Add fruit.';
      if (/Greek yogurt|banana|avocado|peanut butter/i.test(text)) return 'Add creaminess.';
      if (/protein/i.test(text)) return 'Add protein.';
      if (/chia|flax|fat|fiber/i.test(text)) return 'Add fiber or fat.';
      if (/sweet|Honey/i.test(text)) return 'Balance sweetness.';
      return 'Good balance.';
    }

    function renderFeedback(result = null) {
      const feedback = result || evaluateSmoothie();
      document.getElementById('feedbackTitle').textContent = feedback.title;
      document.getElementById('feedbackSummary').textContent = state.hasBlended ? 'Texture · satiety · flavor' : 'Blend to score.';
      document.getElementById('textureScore').textContent = `${feedback.texture}`;
      document.getElementById('satietyScore').textContent = `${feedback.satiety}`;
      document.getElementById('flavorScore').textContent = `${feedback.flavor}`;
      document.getElementById('tags').innerHTML = feedback.tags.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('');
      document.getElementById('recommendationText').textContent = shortRecommendation(feedback.recommendation);
      const button = document.getElementById('recommendationButton');
      if (feedback.suggestion && !state.selected.includes(feedback.suggestion)) {
        button.hidden = false;
        button.textContent = `Add ${byId[feedback.suggestion].name}`;
        button.dataset.add = feedback.suggestion;
      } else {
        button.hidden = false;
        button.textContent = 'Nice blend';
        button.dataset.add = '';
      }
      const compactScore = document.getElementById('compactScore');
      const overallValue = document.getElementById('overallScoreValue');
      const overall = averageScore(feedback);
      compactScore.classList.toggle('is-visible', Boolean(state.hasBlended));
      overallValue.textContent = `${overall}`;
      updateSmoothieColor();
      renderAmountSuggestions();
    }

    function updateSmoothieColor() {
      const fill = document.getElementById('smoothieFill');
      const items = state.selected.map(id => byId[id]);
      fill.setAttribute('fill', items.length ? items[items.length - 1].color : '#f47f8b');
    }



    function amountSnapshotFor(ids, size = state.smoothieSize) {
      const snapshot = {};
      ids.forEach(id => {
        const key = `${size}:${id}`;
        snapshot[id] = state.amounts[key] ?? (amountDefaults[id]?.bySize?.[size] ?? amountDefaults[id]?.bySize?.[16] ?? 1);
      });
      return snapshot;
    }

    function formatAmountFromSnapshot(id, value) {
      const config = amountConfig(id);
      if (config.unit === 'cup') return `${formatFraction(value)} cup${value === 1 ? '' : 's'}`;
      if (config.unit === 'tsp') return `${formatFraction(value)} tsp`;
      if (config.unit === 'g') return `${value} g`;
      if (config.unit === 'scoop') return `${formatFraction(value)} ${config.label || 'scoop'}${value === 1 ? '' : 's'}`;
      if (config.unit === 'item') return `${formatFraction(value)} ${config.label || 'item'}`;
      return `${value}`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function defaultRecipeTitle(ids) {
      const selected = ids.filter(id => byId[id]);
      const fruit = selected.find(id => byId[id].roles.includes('fruit'));
      const protein = selected.find(id => byId[id].roles.includes('protein') && id !== fruit);
      if (fruit && protein) return `${byId[fruit].name} ${byId[protein].name} Smoothie`;
      if (fruit) return `${byId[fruit].name} Smoothie`;
      return 'Custom Smoothie';
    }

    function updateHistoryTitle(entryId, title) {
      const entry = state.history.find(item => item.id === entryId);
      if (!entry) return;
      entry.title = title.trim() || defaultRecipeTitle(entry.ingredients || []);
      setSavedHistory(state.history);
    }

    function markScoreUpdated() {
      const compactScore = document.getElementById('compactScore');
      if (!compactScore) return;
      compactScore.classList.remove('is-updated');
      void compactScore.offsetWidth;
      compactScore.classList.add('is-updated');
      window.setTimeout(() => compactScore.classList.remove('is-updated'), 1200);
    }

    function saveBlend() {
      const ids = state.selected;
      if (!ids.length) return;
      const result = evaluateSmoothie();
      const entry = {
        id: Date.now(),
        date: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
        ingredients: ids,
        sizeOz: state.smoothieSize,
        amounts: amountSnapshotFor(ids, state.smoothieSize),
        title: defaultRecipeTitle(ids),
        score: Math.round((result.texture + result.satiety + result.flavor) / 3)
      };
      state.history = [entry, ...state.history].slice(0, 12);
      setSavedHistory(state.history);
      renderHistory();
      const button = document.getElementById('saveBlendButton');
      button.textContent = 'Saved';
      setTimeout(() => { button.textContent = 'Save'; }, 900);
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!state.history.length) {
        list.innerHTML = '<div class="history-empty">No saved blends yet. Build a smoothie, tap Blend, then Save.</div>';
        return;
      }
      list.innerHTML = state.history.map(entry => {
        const size = entry.sizeOz || 16;
        const savedAmounts = entry.amounts || {};
        const lines = entry.ingredients.filter(id => byId[id]).map(id => {
          const rawValue = savedAmounts[id] ?? savedAmounts[`${size}:${id}`] ?? (amountDefaults[id]?.bySize?.[size] ?? amountDefaults[id]?.bySize?.[16] ?? 1);
          return `<li class="recipe-line"><span class="recipe-line-name">${byId[id]?.name || id}</span><span class="recipe-line-amount">${formatAmountFromSnapshot(id, rawValue)}</span></li>`;
        }).join('');
        const title = entry.title || defaultRecipeTitle(entry.ingredients || []);
        return `<article class="recipe-card">
          <div class="recipe-card-top">
            <div>
              <input class="recipe-title-input" type="text" value="${escapeHtml(title)}" data-title-id="${entry.id}" aria-label="Recipe title">
              <div class="recipe-card-meta">${size} oz · ${entry.ingredients.length} ingredients</div>
            </div>
            <div class="recipe-score" aria-label="Smoothie score ${entry.score}">${entry.score}</div>
          </div>
          <ul class="recipe-lines">${lines}</ul>
          <div class="recipe-card-actions"><span class="recipe-card-date">${entry.date}</span><button class="load-button" type="button" data-load="${entry.id}">Load recipe</button></div>
        </article>`;
      }).join('');
      list.querySelectorAll('[data-load]').forEach(button => button.addEventListener('click', () => loadSavedBlend(Number(button.dataset.load))));
      list.querySelectorAll('[data-title-id]').forEach(input => {
        input.addEventListener('change', () => updateHistoryTitle(Number(input.dataset.titleId), input.value));
        input.addEventListener('keydown', event => {
          if (event.key === 'Enter') input.blur();
        });
      });
    }


    function loadSavedBlend(entryId) {
      const entry = state.history.find(item => item.id === entryId);
      if (!entry) return;
      state.selected = entry.ingredients.filter(id => byId[id]);
      state.smoothieSize = entry.sizeOz || state.smoothieSize || 16;
      state.amounts = {};
      const savedAmounts = entry.amounts || {};
      Object.entries(savedAmounts).forEach(([key, value]) => {
        if (key.includes(':')) state.amounts[key] = value;
        else state.amounts[`${state.smoothieSize}:${key}`] = value;
      });
      state.hasBlended = false;
      closePicker();
      render();
      renderFeedback(evaluateSmoothie());
      document.querySelector('.hero').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function render() {
      renderBubbles();
      renderRail();
      renderHistory();
      renderSizeControls();
      renderAmountSuggestions();
      updateSmoothieColor();
    }

    document.getElementById('blendButton').addEventListener('click', event => {
      const button = event.currentTarget;
      const blender = document.querySelector('.blender');
      const result = evaluateSmoothie();
      button.disabled = true;
      button.querySelector('span').textContent = 'Blending...';
      blender.classList.add('is-blending');

      window.setTimeout(() => {
        blender.classList.remove('is-blending');
        button.disabled = false;
        button.querySelector('span').textContent = 'Blend';
        state.hasBlended = true;
        renderFeedback(result);
        setSmoothieFace(averageScore(result));
        markScoreUpdated();
        const feedback = document.getElementById('feedback');
        feedback.animate([{ borderColor: '#e9e2d8' }, { borderColor: '#ff5f73' }, { borderColor: '#e9e2d8' }], { duration: 600, easing: 'ease-out' });
      }, 1700);
    });

    document.getElementById('recommendationButton').addEventListener('click', event => {
      const id = event.currentTarget.dataset.add;
      if (id) { addIngredient(id); renderFeedback(evaluateSmoothie()); }
    });

    document.getElementById('saveBlendButton').addEventListener('click', saveBlend);
    document.querySelectorAll('.size-tab').forEach(button => button.addEventListener('click', () => setSmoothieSize(button.dataset.size)));

    render();
    renderFeedback({
      title: 'Build your smoothie',
      summary: 'Blend to score.',
      texture: 0,
      satiety: 0,
      flavor: 0,
      tags: ['Liquids first', 'Do not over-blend', 'Drink right away'],
      recommendation: 'Start with a liquid base, then add fruit, protein, and fat/fiber.',
      suggestion: 'milk'
    });
  </script>
</body>
</html>
